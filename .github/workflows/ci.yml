name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  php-unit:
    name: PHP unit suite (MediaWiki 1.43)
    runs-on: ubuntu-latest
    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Clone MediaWiki REL1_43
        run: git clone --depth 1 -b REL1_43 https://github.com/wikimedia/mediawiki.git mediawiki
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          path: src
      - name: Place the extension into MediaWiki
        run: cp -r src mediawiki/extensions/TimeTracker
      - name: Install MediaWiki PHP dependencies
        working-directory: mediawiki
        run: composer install --no-interaction --no-progress
      - name: Run unit suite
        working-directory: mediawiki
        run: >-
          vendor/bin/phpunit
          -c extensions/TimeTracker/tests/phpunit/phpunit.xml.dist
          --testsuite unit
